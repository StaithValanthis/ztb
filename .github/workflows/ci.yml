name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'strat/**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: read
  statuses: write

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff-format)
        run: ruff format --check .
      - name: Types (mypy)
        run: mypy --strict ztb/
      - name: Test + coverage
        run: pytest -m "not network" --cov-fail-under=90 --cov=ztb --cov-report=term-missing
      - name: Secret scan
        run: python3 scripts/secret-scan.py $(git diff --name-only HEAD~1..HEAD 2>/dev/null || find . -name '*.py' -o -name '*.toml' -o -name '*.yaml' -o -name '*.yml' -o -name '*.cfg' -o -name '*.ini' | grep -v __pycache__ | grep -v .git)
      - name: Version consistency
        run: |
          python3 -c "
          import importlib.metadata
          from ztb import __version__
          ver = importlib.metadata.version('ztb')
          assert ver == __version__, f'{ver} != {__version__}'
          print(f'Version OK: {ver}')
          "

  vr-pass:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install --upgrade pip
      - if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        name: Notify V&R pending via bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/ztb-vr-pass-bridge.py --sha ${{ github.sha }} --mode notify
      - if: github.ref != 'refs/heads/main' || github.event_name != 'push'
        name: VR-PASS placeholder
        run: echo "VR-PASS: skipped (not push to main)"
