name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'strat/**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: read
  statuses: write

jobs:
  test:
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff-format)
        run: ruff format --check .
      - name: Types (mypy)
        run: mypy --strict ztb/
      - name: Test + coverage
        run: pytest -m "not network" --cov-fail-under=90 --cov=ztb --cov-report=term-missing --timeout=120
      - name: Secret scan
        run: python3 scripts/secret-scan.py $(git diff --name-only HEAD~1..HEAD 2>/dev/null || find . -name '*.py' -o -name '*.toml' -o -name '*.yaml' -o -name '*.yml' -o -name '*.cfg' -o -name '*.ini' | grep -v __pycache__ | grep -v .git)
      - name: Version consistency
        run: |
          python3 -c "
          import importlib.metadata
          from ztb import __version__
          ver = importlib.metadata.version('ztb')
          assert ver == __version__, f'{ver} != {__version__}'
          print(f'Version OK: {ver}')
          "

  vr-pass:
    needs: [test]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install --upgrade pip
      - name: Notify V&R pending via bridge
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python3 scripts/ztb-vr-pass-bridge.py --sha "$SHA" --mode notify

  strategy-evidence-gate:
    # runs AFTER strategy-validate (always(), so the required check still reports even if an
    # upstream job fails) and accepts a green strategy-validate as the evidence — no per-PR V&R cycle.
    needs: [test, strategy-validate]
    if: ${{ always() && github.event_name == 'pull_request' }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install --upgrade pip
      - name: Run evidence-gate check
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/ztb-evidence-gate-check.py --sha "$SHA"

  strategy-validate:
    needs: [test]
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run ztb validate on changed strategy plugins (real edge gate, not attestation)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python3 scripts/ztb-ci-strategy-validate.py --base "$BASE_SHA"
